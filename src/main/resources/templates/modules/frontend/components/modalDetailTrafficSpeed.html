<div
  th:fragment="modal-detail-traffic-speed"
  class="modal modal-xl fade"
  id="modal-detail-TS"
  tabindex="-1"
  data-bs-theme="dark"
  aria-labelledby="#modal-detail-traffic-speed"
  aria-hidden="true"
>
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <div
          class="title-TS"
          style="display: flex; flex-wrap: wrap; width: 500px"
        >
          <h1 class="modal-title fs-5" id="modalTitle">
            Traffic speed details table
          </h1>
          <br />
          <p id="trafficinfoId" style="margin-bottom: 0; opacity: 0.4"></p>
        </div>

        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>
      <div class="modal-body">
        <table
          class="table table-dark table-bordered table-hover table-striped"
        >
          <thead>
            <tr>
              <th scope="col">#</th>
              <th scope="col">ID</th>
              <th scope="col">FRC</th>
              <th scope="col">Current speed</th>
              <th scope="col">Free flow speed</th>
              <th scope="col">Traffic Level</th>
              <th scope="col">Current travel time</th>
              <th scope="col">Free flow travel time</th>
              <th scope="col">Confidence</th>
              <th scope="col">Road closure</th>
              <th scope="col">Created at</th>
            </tr>
          </thead>
          <tbody class="table-group-divider"></tbody>
        </table>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
          Close
        </button>
      </div>
    </div>
  </div>
</div>
